# Visual regression CI — Lost Pixel (free, GitHub-native).
# Roda Storybook build + captura screenshots de cada story + compara baseline.
#
# Setup inicial (1x): rode workflow manualmente, baseline é commitado em
# `.lostpixel/baseline/`. Próximas runs comparam contra baseline.
# Atualizar baseline: comment `/lp update` no PR ou git push de novo baseline.
#
# PRD: docs/plans/2026-05-19-bundle-4-ui-ux-wave3.md.

name: Visual regression

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lost-pixel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Lost Pixel
        uses: lost-pixel/lost-pixel@v3.22.0
        env:
          LOST_PIXEL_API_KEY: ${{ secrets.LOST_PIXEL_API_KEY }}
        # Sem LOST_PIXEL_API_KEY: roda local (compara contra baseline commitado).
        # Com key (free 5k snapshots/mês): roda na plataforma deles, +histórico.
